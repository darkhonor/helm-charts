{{- range $name, $consumer := .Values.msg.consumers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openrmf.fullname" $ }}-msg-{{ $name }}
  namespace: {{ include "openrmf.namespace" $ }}
  labels:
    {{- include "openrmf.labels" $ | nindent 4 }}
    app.kubernetes.io/component: msg-{{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "openrmf.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: msg-{{ $name }}
  template:
    metadata:
      labels:
        {{- include "openrmf.labels" $ | nindent 8 }}
        app.kubernetes.io/component: msg-{{ $name }}
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "openrmf.serviceAccountName" $ }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- with $.Values.images.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: msg-{{ $name }}
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          image: "{{ (index $.Values.images.msg $name).repository }}:{{ (index $.Values.images.msg $name).tag }}"
          imagePullPolicy: {{ $.Values.images.pullPolicy }}
          env:
            - name: NABORSERVER
              value: "nats://{{ include "openrmf.fullname" $ }}-nats:{{ $.Values.nats.port }}"
            {{- if $consumer.dbConnectionKey }}
            - name: DBCONNECTION
              valueFrom:
                secretKeyRef:
                  name: {{ include "openrmf.mongodbSecretName" $ }}
                  key: {{ $consumer.dbConnectionKey }}
            {{- end }}
            {{- with $.Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $.Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml $consumer.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- with $.Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with $.Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
