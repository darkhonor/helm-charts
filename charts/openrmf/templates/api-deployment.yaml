{{- range $name, $svc := .Values.api.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openrmf.fullname" $ }}-api-{{ $name }}
  namespace: {{ include "openrmf.namespace" $ }}
  labels:
    {{- include "openrmf.labels" $ | nindent 4 }}
    app.kubernetes.io/component: api-{{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "openrmf.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: api-{{ $name }}
  template:
    metadata:
      labels:
        {{- include "openrmf.labels" $ | nindent 8 }}
        app.kubernetes.io/component: api-{{ $name }}
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "openrmf.serviceAccountName" $ }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- with $.Values.images.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-{{ $name }}
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          image: "{{ (index $.Values.images.api $name).repository }}:{{ (index $.Values.images.api $name).tag }}"
          imagePullPolicy: {{ $.Values.images.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          env:
            - name: JWTAUTHORITY
              value: "{{ include "openrmf.keycloakURL" $ }}/realms/{{ include "openrmf.keycloakRealm" $ }}"
            - name: JWTCLIENT
              valueFrom:
                secretKeyRef:
                  name: {{ include "openrmf.oidcSecretName" $ }}
                  key: {{ $.Values.keycloak.external.clientIdKey | default "client-id" }}
            - name: NABORSERVER
              value: "nats://{{ include "openrmf.fullname" $ }}-nats:{{ $.Values.nats.port }}"
            {{- if $svc.dbConnectionKey }}
            - name: DBCONNECTION
              valueFrom:
                secretKeyRef:
                  name: {{ include "openrmf.mongodbSecretName" $ }}
                  key: {{ $svc.dbConnectionKey }}
            {{- end }}
            {{- with $.Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $.Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- with $.Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with $.Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
