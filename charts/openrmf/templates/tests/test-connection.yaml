apiVersion: v1
kind: Pod
metadata:
  name: {{ include "openrmf.fullname" . }}-test-connection
  namespace: {{ include "openrmf.namespace" . }}
  labels:
    {{- include "openrmf.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
  containers:
    - name: wget
      image: busybox:1.37.0
      command: ['wget']
      args: ['--spider', '--timeout=5', 'http://{{ include "openrmf.fullname" . }}-web:{{ .Values.web.port }}']
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never
