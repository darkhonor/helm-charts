{{- /* Guard clause: hostPath is prohibited */ -}}
{{- if .Values.persistence.hostPath }}
{{- fail "persistence.hostPath is prohibited - violates PSS restricted and NIST SP800-53 SC-28. Use a PVC with an encrypted StorageClass instead." }}
{{- end }}

{{- /* Guard clause: external Keycloak requires existingSecret */ -}}
{{- if and (eq .Values.keycloak.mode "external") (not .Values.keycloak.external.existingSecret) }}
{{- fail "keycloak.external.existingSecret is required when keycloak.mode is external. Create the secret via Vault Secrets Operator in manifests/." }}
{{- end }}

{{- /* Guard clause: external MongoDB requires existingSecret */ -}}
{{- if and (eq .Values.mongodb.mode "external") (not .Values.mongodb.external.existingSecret) }}
{{- fail "mongodb.external.existingSecret is required when mongodb.mode is external. Create the secret via Vault Secrets Operator in manifests/." }}
{{- end }}
