{{- if eq .Values.mongodb.mode "operator" }}
{{- range .Values.mongodb.operator.databases }}
{{- $secretName := printf "%s-mongodb-%s" (include "openrmf.fullname" $) . }}
{{- $existingSecret := lookup "v1" "Secret" (include "openrmf.namespace" $) $secretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "openrmf.namespace" $ }}
  labels:
    {{- include "openrmf.labels" $ | nindent 4 }}
    app.kubernetes.io/component: mongodb
type: Opaque
data:
  {{- if $existingSecret }}
  password: {{ index $existingSecret.data "password" }}
  {{- else }}
  password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
