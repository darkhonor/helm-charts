{{- if .Values.secrets.searxngSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "searxng.secretName" . }}
  namespace: {{ include "searxng.namespace" . }}
  labels:
    {{- include "searxng.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.secrets.searxngSecret.key }}: {{ default (randAlphaNum 64) .Values.secrets.searxngSecret.value | b64enc | quote }}
{{- end }}
