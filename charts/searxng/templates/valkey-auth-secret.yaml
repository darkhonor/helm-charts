# Filename: valkey-auth-secret.yaml
# Last Modified: 2026-03-07
# Summary: Auto-generated Valkey authentication secret with random password
# Compliant With: DoD STIG, NIST SP800-53 Rev 5
# Classification: UNCLASSIFIED
{{- if and .Values.valkey.auth.enabled (not .Values.valkey.auth.existingSecret) }}
{{- $secretName := include "searxng.valkeyAuthSecretName" . }}
{{- $secretKey := .Values.valkey.auth.key }}
{{- $existingSecret := lookup "v1" "Secret" (include "searxng.namespace" .) $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "searxng.namespace" . }}
  labels:
    {{- include "searxng.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existingSecret (not .Values.valkey.auth.password) }}
  {{ $secretKey }}: {{ index $existingSecret.data $secretKey }}
  {{- else }}
  {{ $secretKey }}: {{ default (randAlphaNum 32) .Values.valkey.auth.password | b64enc | quote }}
  {{- end }}
{{- end }}
